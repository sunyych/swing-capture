<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swing 复核台</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
      .wrap { max-width: 1380px; margin: 0 auto; padding: 16px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .pill { border: 1px solid #d1d5db; border-radius: 999px; padding: 6px 10px; font-size: 12px; background: #fff; }
      .hint { color: #6b7280; font-size: 13px; line-height: 1.5; margin-top: 8px; }
      .kpi { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; }
      .kpi .card { margin: 0; }
      .kpi strong { font-size: 20px; display: block; }
      .layout { display: grid; grid-template-columns: minmax(420px, 1.1fr) minmax(360px, 0.9fr); gap: 12px; }
      .list { max-height: 74vh; overflow: auto; border: 1px solid #e5e7eb; border-radius: 10px; }
      .item { padding: 10px; border-bottom: 1px solid #eef2f7; cursor: pointer; }
      .item:hover { background: #f8fafc; }
      .item.active { background: #eff6ff; }
      .item-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
      .score { font-size: 22px; font-weight: 800; color: #0f766e; white-space: nowrap; }
      .meta { font-size: 12px; color: #6b7280; line-height: 1.5; }
      video { width: 100%; background: #000; border-radius: 10px; }
      button { border: 0; border-radius: 10px; padding: 8px 12px; font-weight: 700; cursor: pointer; }
      .b-pos { background: #15803d; color: #fff; }
      .b-neg { background: #b91c1c; color: #fff; }
      .b-skip { background: #a16207; color: #fff; }
      .b-clear { background: #374151; color: #fff; }
      .b-train { background: #0f766e; color: #fff; }
      .tag { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid #d1d5db; white-space: nowrap; }
      .t-auto { background: #fff7ed; border-color: #fdba74; }
      .t-manual { background: #eef2ff; border-color: #a5b4fc; }
      .t-reviewed { background: #ecfeff; border-color: #67e8f9; }
      .t-conflict { background: #fef2f2; border-color: #fca5a5; }
      .t-unlabeled { background: #f8fafc; border-color: #cbd5e1; }
      .detail-grid { display: grid; grid-template-columns: 140px 1fr; gap: 6px 10px; margin-top: 10px; }
      .detail-grid div:nth-child(odd) { color: #6b7280; }
      @media (max-width: 900px) {
        .kpi { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .layout { grid-template-columns: 1fr; }
        .list { max-height: 45vh; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2 style="margin:0 0 8px 0">SwingCapture 可信度复核</h2>
        <div class="row">
          <span class="pill" id="taskName">任务</span>
          <span class="pill" id="saveStatus">保存状态：就绪</span>
          <span class="pill" id="trainStatus">训练：未启动</span>
          <select id="filterSelect" class="pill">
            <option value="ranked">按 swing 可信度排序</option>
            <option value="raw_review">仅 raw review</option>
            <option value="pose_review">仅 pose clips</option>
            <option value="needs_review">仅待复核建议</option>
            <option value="label_positive">仅已标 swing</option>
            <option value="label_negative">仅已标非 swing</option>
            <option value="auto_predicted_positive">仅自动预测为 swing</option>
            <option value="reviewed">仅已复核</option>
            <option value="conflict">仅与自动预测不同</option>
            <option value="unlabeled">仅未标注</option>
          </select>
        </div>
        <div class="hint">
          列表会优先使用模型给出的 <strong id="positiveName">baseball_swing</strong> 概率，从高到低排列。你在右侧选择 swing / 非 swing 后会写回 labels.json，之后训练脚本可以只使用这些人工复核标签。
        </div>
      </div>
      <div class="kpi">
        <div class="card"><span>候选总数</span><strong id="kTotal">0</strong></div>
        <div class="card"><span>自动建议</span><strong id="kAuto">0</strong></div>
        <div class="card"><span>待复核</span><strong id="kNeedsReview">0</strong></div>
        <div class="card"><span>已复核</span><strong id="kReviewed">0</strong></div>
        <div class="card"><span>已标 swing</span><strong id="kPositive">0</strong></div>
        <div class="card"><span>已标非 swing</span><strong id="kNegative">0</strong></div>
      </div>
      <div class="layout" style="margin-top:12px">
        <div class="card">
          <div class="list" id="list"></div>
        </div>
        <div class="card">
          <video id="video" controls autoplay muted playsinline preload="metadata"></video>
          <div style="margin-top:8px" id="detail"></div>
          <div class="row" style="margin-top:10px">
            <button id="btnPos" class="b-pos">正样本</button>
            <button id="btnNeg" class="b-neg">负样本</button>
            <button id="btnSkip" class="b-skip">skip</button>
            <button id="btnClear" class="b-clear">清空人工标签</button>
            <button id="btnTrain" class="b-train">复核完成，开始再次训练</button>
          </div>
          <div class="hint">快捷键：D 标为 swing，A 标为非 swing，S 标为 skip，J / K 切换下一条 / 上一条。再次训练会在后端异步运行，并跳转到进度页。</div>
        </div>
      </div>
    </div>
    <script src="./review_data.js"></script>
    <script>
      const reviewData = window.REVIEW_DATA || { candidates: [] };
      const positive = reviewData.positive_label || "baseball_swing";
      const negative = reviewData.negative_label || "other";
      document.getElementById("btnPos").textContent = positive;
      document.getElementById("btnNeg").textContent = negative;
      document.getElementById("taskName").textContent = `任务：${reviewData.task_name || "review"}`;
      document.getElementById("positiveName").textContent = positive;

      let labels = {};
      let currentId = null;
      let visible = [];
      let persistTimer = null;

      const elList = document.getElementById("list");
      const elVideo = document.getElementById("video");
      const elDetail = document.getElementById("detail");
      const elFilter = document.getElementById("filterSelect");
      const elSave = document.getElementById("saveStatus");
      const elTrainStatus = document.getElementById("trainStatus");
      const elTrainButton = document.getElementById("btnTrain");

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        }[char]));
      }

      function hasAuto(record) {
        return !!(
          record &&
          (record.autoPredictedByModel || record.autoPredictedLabel || record.autoPredictedClassProbs)
        );
      }

      function positiveConfidence(record) {
        if (!record) return null;
        const classProbs = record.autoPredictedClassProbs || {};
        const candidates = [
          record.autoPositiveConfidence,
          classProbs[positive],
          record.autoPredictedLabel === positive ? record.autoPredictedConfidence : null,
        ];
        for (const value of candidates) {
          const numeric = Number(value);
          if (Number.isFinite(numeric)) return numeric;
        }
        return null;
      }

      function rankScore(candidate) {
        const confidence = positiveConfidence(labels[candidate.candidate_id]);
        if (confidence !== null) return confidence;
        return -1;
      }

      function confidenceText(record) {
        const confidence = positiveConfidence(record);
        return confidence === null ? "-" : `${(confidence * 100).toFixed(1)}%`;
      }

      function stateOf(record) {
        if (!record || !record.label) return hasAuto(record) ? "needs_review" : "unlabeled";
        if (record.reviewedByHuman) {
          return hasAuto(record) && record.label !== record.autoPredictedLabel ? "conflict" : "reviewed";
        }
        if (record.labelSource === "auto_prediction" || hasAuto(record)) return "auto";
        return "manual_initial";
      }

      function tagHtml(state) {
        if (state === "needs_review") return '<span class="tag t-auto">待复核建议</span>';
        if (state === "auto") return '<span class="tag t-auto">自动预标注</span>';
        if (state === "manual_initial") return '<span class="tag t-manual">初始人工标注</span>';
        if (state === "reviewed") return '<span class="tag t-reviewed">已复核</span>';
        if (state === "conflict") return '<span class="tag t-conflict">复核已改动</span>';
        return '<span class="tag t-unlabeled">未标注</span>';
      }

      function candidateById(id) {
        return reviewData.candidates.find((x) => x.candidate_id === id) || null;
      }

      function renderKpi() {
        const counters = {
          total: reviewData.candidates.length,
          auto: 0,
          needsReview: 0,
          reviewed: 0,
          positive: 0,
          negative: 0,
        };
        reviewData.candidates.forEach((c) => {
          const record = labels[c.candidate_id] || {};
          if (hasAuto(record)) counters.auto += 1;
          if (hasAuto(record) && !record.reviewedByHuman) counters.needsReview += 1;
          if (record.reviewedByHuman) counters.reviewed += 1;
          if (record.label === positive) counters.positive += 1;
          if (record.label === negative) counters.negative += 1;
        });
        document.getElementById("kTotal").textContent = counters.total;
        document.getElementById("kAuto").textContent = counters.auto;
        document.getElementById("kNeedsReview").textContent = counters.needsReview;
        document.getElementById("kReviewed").textContent = counters.reviewed;
        document.getElementById("kPositive").textContent = counters.positive;
        document.getElementById("kNegative").textContent = counters.negative;
      }

      function matchesFilter(candidateId) {
        const f = elFilter.value;
        const candidate = candidateById(candidateId);
        const record = labels[candidateId] || {};
        if (f === "ranked") return true;
        if (f === "raw_review") return candidate?.has_pose_features === false;
        if (f === "pose_review") return candidate?.has_pose_features !== false;
        if (f === "needs_review") return hasAuto(record) && !record.reviewedByHuman;
        if (f === "label_positive") return record.label === positive;
        if (f === "label_negative") return record.label === negative;
        if (f === "auto_predicted_positive") return record.autoPredictedLabel === positive;
        return stateOf(record) === f;
      }

      function orderedCandidates() {
        return reviewData.candidates
          .filter((c) => matchesFilter(c.candidate_id))
          .sort((a, b) => {
            const scoreDelta = rankScore(b) - rankScore(a);
            if (Math.abs(scoreDelta) > 0.000001) return scoreDelta;
            const peakDelta = Number(b.peak_score || 0) - Number(a.peak_score || 0);
            if (Math.abs(peakDelta) > 0.000001) return peakDelta;
            return (a.source_order || 0) - (b.source_order || 0)
              || (a.source_candidate_index || 0) - (b.source_candidate_index || 0);
          });
      }

      function renderList() {
        visible = orderedCandidates();
        elList.innerHTML = "";
        if (!visible.length) {
          elList.innerHTML = '<div class="item">当前筛选下没有候选。</div>';
          currentId = null;
          elDetail.innerHTML = "";
          elVideo.removeAttribute("src");
          return;
        }
        if (!currentId || !visible.some((x) => x.candidate_id === currentId)) {
          currentId = visible[0].candidate_id;
        }
        visible.forEach((c, index) => {
          const rec = labels[c.candidate_id] || {};
          const st = stateOf(rec);
          const div = document.createElement("div");
          div.className = `item${currentId === c.candidate_id ? " active" : ""}`;
          div.innerHTML = `
            <div class="item-head">
              <div>
                <strong>#${index + 1} ${escapeHtml(c.candidate_id)}</strong>
                ${tagHtml(st)}
              </div>
              <div class="score">${confidenceText(rec)}</div>
            </div>
            <div class="meta">
              ${escapeHtml(c.source_name)} · 当前标签: ${escapeHtml(rec.label || "未标注")}
              · 自动预测: ${escapeHtml(rec.autoPredictedLabel || "-")}
              · ${c.has_pose_features === false ? "raw review" : `peak score: ${Number(c.peak_score || 0).toFixed(2)}`}
            </div>
          `;
          div.onclick = () => selectCandidate(c.candidate_id);
          elList.appendChild(div);
        });
        renderDetail();
      }

      function selectCandidate(id) {
        currentId = id;
        renderList();
      }

      function renderDetail() {
        const c = candidateById(currentId);
        if (!c) return;
        const rec = labels[c.candidate_id] || {};
        elVideo.src = c.video_rel_path;
        elVideo.load();
        elVideo.play().catch(() => {});
        const classProbs = rec.autoPredictedClassProbs || {};
        const positiveProb = positiveConfidence(rec);
        elDetail.innerHTML = `
          <div><strong>${escapeHtml(c.candidate_id)}</strong> ${tagHtml(stateOf(rec))}</div>
          <div class="detail-grid">
            <div>source</div><div>${escapeHtml(c.source_name)}</div>
            <div>swing 可信度</div><div><strong>${confidenceText(rec)}</strong></div>
            <div>当前标签</div><div>${escapeHtml(rec.label || "未标注")}</div>
            <div>自动预测</div><div>${escapeHtml(rec.autoPredictedLabel || "-")} (${rec.autoPredictedConfidence ? rec.autoPredictedConfidence.toFixed(3) : "-"})</div>
            <div>${escapeHtml(positive)} 概率</div><div>${positiveProb === null ? "-" : positiveProb.toFixed(4)}</div>
            <div>${escapeHtml(negative)} 概率</div><div>${Number.isFinite(Number(classProbs[negative])) ? Number(classProbs[negative]).toFixed(4) : "-"}</div>
            <div>候选类型</div><div>${c.has_pose_features === false ? "raw review" : "pose clip"}</div>
            <div>peak score</div><div>${c.has_pose_features === false ? "-" : Number(c.peak_score || 0).toFixed(3)}</div>
            <div>窗口</div><div>${Number(c.window_start_ms || 0).toFixed(0)}ms - ${Number(c.window_end_ms || 0).toFixed(0)}ms</div>
            <div>状态</div><div>${escapeHtml(stateOf(rec))}</div>
          </div>
        `;
      }

      async function loadLabels() {
        const r = await fetch("/api/labels");
        labels = r.ok ? await r.json() : {};
      }

      async function persist() {
        await fetch("/api/labels", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(labels),
        });
      }

      async function persistNow() {
        if (persistTimer) {
          clearTimeout(persistTimer);
          persistTimer = null;
        }
        elSave.textContent = "保存状态：正在保存";
        await persist();
        elSave.textContent = "保存状态：已保存";
      }

      function schedulePersist() {
        elSave.textContent = "保存状态：待保存";
        if (persistTimer) clearTimeout(persistTimer);
        persistTimer = setTimeout(async () => {
          try {
            await persist();
            elSave.textContent = "保存状态：已保存";
          } catch (_) {
            elSave.textContent = "保存状态：失败";
          }
        }, 200);
      }

      function move(delta) {
        if (!visible.length) return;
        const index = visible.findIndex((x) => x.candidate_id === currentId);
        const nextIndex = Math.min(visible.length - 1, Math.max(0, index + delta));
        currentId = visible[nextIndex].candidate_id;
        renderList();
      }

      function moveToNextAfter(candidateId) {
        const index = visible.findIndex((x) => x.candidate_id === candidateId);
        if (index < 0 || !visible.length) return;
        const nextIndex = Math.min(visible.length - 1, index + 1);
        currentId = visible[nextIndex].candidate_id;
      }

      function clearHumanLabel(candidate) {
        const old = labels[candidate.candidate_id] || {};
        if (!hasAuto(old)) {
          delete labels[candidate.candidate_id];
          return;
        }
        const kept = { ...old };
        delete kept.label;
        delete kept.labelSource;
        delete kept.reviewedByHuman;
        delete kept.reviewedAt;
        labels[candidate.candidate_id] = kept;
      }

      function mark(label) {
        const c = candidateById(currentId);
        if (!c) return;
        const oldId = c.candidate_id;
        const old = labels[c.candidate_id] || {};
        if (!label) {
          clearHumanLabel(c);
        } else {
          labels[c.candidate_id] = {
            ...old,
            label,
            labelSource: "human_review",
            source_id: c.source_id,
            source_name: c.source_name,
            source_order: c.source_order,
            source_candidate_index: c.source_candidate_index,
            peak_score: c.peak_score,
            peak_timestamp_ms: c.peak_timestamp_ms,
            has_pose_features: c.has_pose_features,
            candidate_kind: c.candidate_kind,
            csv_rel_path: c.csv_rel_path,
            json_rel_path: c.json_rel_path,
            video_rel_path: c.video_rel_path,
            window_start_ms: c.window_start_ms,
            window_end_ms: c.window_end_ms,
            reviewedByHuman: true,
            reviewedAt: new Date().toISOString(),
          };
        }
        schedulePersist();
        renderKpi();
        visible = orderedCandidates();
        if (label) moveToNextAfter(oldId);
        renderList();
      }

      async function startTraining() {
        elTrainButton.disabled = true;
        elTrainStatus.textContent = "训练：正在保存标签";
        try {
          await persistNow();
          elTrainStatus.textContent = "训练：正在提交后台任务";
          const response = await fetch("/api/train/start", { method: "POST" });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || response.statusText);
          elTrainStatus.textContent = payload.reused ? "训练：已有任务运行中" : "训练：已启动";
          window.location.href = payload.status_url || `/train_status.html?job_id=${encodeURIComponent(payload.job.id)}`;
        } catch (error) {
          elTrainStatus.textContent = `训练：启动失败 ${error}`;
          elTrainButton.disabled = false;
        }
      }

      document.getElementById("btnPos").onclick = () => mark(positive);
      document.getElementById("btnNeg").onclick = () => mark(negative);
      document.getElementById("btnSkip").onclick = () => mark("skip");
      document.getElementById("btnClear").onclick = () => mark(null);
      elTrainButton.onclick = startTraining;
      elFilter.onchange = () => renderList();
      document.addEventListener("keydown", (event) => {
        if (event.target && ["INPUT", "TEXTAREA", "SELECT"].includes(event.target.tagName)) return;
        if (event.key.toLowerCase() === "d") mark(positive);
        if (event.key.toLowerCase() === "a") mark(negative);
        if (event.key.toLowerCase() === "s") mark("skip");
        if (event.key.toLowerCase() === "j") move(1);
        if (event.key.toLowerCase() === "k") move(-1);
      });

      (async () => {
        await loadLabels();
        renderKpi();
        renderList();
      })();
    </script>
  </body>
</html>
