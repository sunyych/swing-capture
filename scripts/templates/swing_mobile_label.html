<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Swing Mobile Label</title>
    <style>
      :root {
        --bg: #07120f;
        --panel: rgba(7, 18, 15, 0.76);
        --text: #f8fafc;
        --muted: #a7f3d0;
        --good: #16a34a;
        --bad: #dc2626;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
      .app { position: fixed; inset: 0; display: grid; grid-template-rows: auto 1fr auto; touch-action: none; }
      .top { z-index: 2; padding: calc(env(safe-area-inset-top) + 10px) 14px 10px; background: linear-gradient(180deg, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0)); }
      .title { display: flex; justify-content: space-between; gap: 10px; align-items: center; font-size: 13px; }
      .source { font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pill { border: 1px solid rgba(255, 255, 255, 0.26); border-radius: 999px; padding: 5px 9px; background: rgba(0, 0, 0, 0.3); white-space: nowrap; }
      .meta { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.4; }
      .stage { position: relative; overflow: hidden; display: grid; place-items: center; }
      video { width: 100%; height: 100%; object-fit: contain; background: #000; }
      .empty { padding: 24px; text-align: center; color: var(--muted); }
      .toast { position: absolute; left: 50%; bottom: 116px; transform: translateX(-50%); z-index: 3; padding: 10px 14px; border-radius: 999px; background: var(--panel); color: var(--text); opacity: 0; transition: opacity 160ms ease; pointer-events: none; }
      .toast.show { opacity: 1; }
      .bottom { z-index: 2; padding: 10px 14px calc(env(safe-area-inset-bottom) + 12px); background: linear-gradient(0deg, rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0)); }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      button { border: 0; border-radius: 18px; padding: 18px 10px; color: white; font-size: 20px; font-weight: 900; box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24); }
      .other { background: var(--bad); }
      .swing { background: var(--good); }
      .hint { margin-top: 8px; text-align: center; font-size: 12px; color: rgba(255, 255, 255, 0.72); }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <div class="top">
        <div class="title">
          <div class="source" id="sourceName">加载中</div>
          <div class="pill" id="progress">0 / 0</div>
        </div>
        <div class="meta" id="meta">上下滑切换片段，左右滑切换视频分组</div>
      </div>

      <main class="stage" id="stage">
        <video id="video" controls autoplay muted playsinline preload="metadata"></video>
        <div class="empty" id="empty" hidden>没有候选片段</div>
        <div class="toast" id="toast"></div>
      </main>

      <div class="bottom">
        <div class="actions">
          <button class="other" id="btnOther">other</button>
          <button class="swing" id="btnSwing">swing</button>
        </div>
        <div class="hint" id="saveStatus">保存状态：就绪</div>
      </div>
    </div>

    <script src="./review_data.js"></script>
    <script>
      const reviewData = window.REVIEW_DATA || { candidates: [], sources: [] };
      const mode = new URLSearchParams(window.location.search).get("mode") || "all";
      const candidates = (Array.isArray(reviewData.candidates) ? reviewData.candidates : []).filter((candidate) => {
        if (mode === "raw") return candidate.has_pose_features === false;
        if (mode === "pose") return candidate.has_pose_features !== false;
        return true;
      });
      const positive = reviewData.positive_label || "baseball_swing";
      const negative = reviewData.negative_label || "other";

      let labels = {};
      let groups = [];
      let currentGroupIndex = 0;
      let currentIndex = 0;
      let touchStartX = 0;
      let touchStartY = 0;
      let touchStartTime = 0;

      const elApp = document.getElementById("app");
      const elVideo = document.getElementById("video");
      const elEmpty = document.getElementById("empty");
      const elSourceName = document.getElementById("sourceName");
      const elProgress = document.getElementById("progress");
      const elMeta = document.getElementById("meta");
      const elSaveStatus = document.getElementById("saveStatus");
      const elToast = document.getElementById("toast");
      const elBtnSwing = document.getElementById("btnSwing");
      const elBtnOther = document.getElementById("btnOther");

      elBtnSwing.textContent = positive;
      elBtnOther.textContent = negative;

      function buildGroups() {
        const sourceOrder = Array.isArray(reviewData.sources)
          ? [...reviewData.sources].sort((a, b) => (a.source_order || 0) - (b.source_order || 0))
          : [];
        const map = new Map();
        candidates.forEach((candidate, index) => {
          if (!map.has(candidate.source_id)) {
            const source = sourceOrder.find((item) => item.source_id === candidate.source_id);
            map.set(candidate.source_id, {
              source_id: candidate.source_id,
              source_name: candidate.source_name || source?.source_name || candidate.source_id,
              source_order: candidate.source_order || source?.source_order || map.size + 1,
              indices: [],
            });
          }
          map.get(candidate.source_id).indices.push(index);
        });
        groups = [...map.values()].sort((a, b) => a.source_order - b.source_order);
        groups.forEach((group) => {
          group.indices.sort((a, b) => {
            const left = candidates[a]?.source_candidate_index || 0;
            const right = candidates[b]?.source_candidate_index || 0;
            return left - right;
          });
        });
      }

      function currentGroup() {
        return groups[currentGroupIndex] || null;
      }

      function currentCandidate() {
        return candidates[currentIndex] || null;
      }

      function currentPositionInGroup() {
        const group = currentGroup();
        if (!group) return -1;
        return group.indices.indexOf(currentIndex);
      }

      function syncGroupFromCurrent() {
        const candidate = currentCandidate();
        if (!candidate) return;
        const index = groups.findIndex((group) => group.source_id === candidate.source_id);
        if (index >= 0) currentGroupIndex = index;
      }

      function firstUnlabeledIndex(group) {
        if (!group) return undefined;
        return group.indices.find((index) => !labels[candidates[index].candidate_id]?.label);
      }

      function render() {
        const candidate = currentCandidate();
        syncGroupFromCurrent();
        const group = currentGroup();
        if (!candidate || !group) {
          elVideo.hidden = true;
          elEmpty.hidden = false;
          elSourceName.textContent = "没有候选片段";
          elProgress.textContent = "0 / 0";
          elMeta.textContent = "请先生成 review workspace";
          return;
        }

        const record = labels[candidate.candidate_id] || {};
        const groupPosition = currentPositionInGroup();
        const labeledCount = group.indices.filter((index) => labels[candidates[index].candidate_id]?.label).length;
        elVideo.hidden = false;
        elEmpty.hidden = true;
        if (elVideo.getAttribute("src") !== candidate.video_rel_path) {
          elVideo.src = candidate.video_rel_path;
          elVideo.load();
          elVideo.play().catch(() => {});
        }
        elSourceName.textContent = group.source_name;
        elProgress.textContent = `${groupPosition + 1} / ${group.indices.length}`;
        const mode = candidate.has_pose_features === false ? "raw review" : "pose clip";
        const modeText = candidate.has_pose_features === false ? "raw review" : "pose clip";
        const scopeText = mode === "raw" ? " · 仅 raw" : mode === "pose" ? " · 仅 pose" : "";
        elMeta.textContent = `第 ${currentGroupIndex + 1} / ${groups.length} 组 · 已标 ${labeledCount} / ${group.indices.length} · 当前：${record.label || "未标注"} · ${modeText}${scopeText}`;
      }

      function showToast(message) {
        elToast.textContent = message;
        elToast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => elToast.classList.remove("show"), 800);
      }

      async function loadLabels() {
        const response = await fetch("/api/labels");
        labels = response.ok ? await response.json() : {};
      }

      async function persistLabels() {
        elSaveStatus.textContent = "保存状态：正在保存";
        await fetch("/api/labels", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(labels),
        });
        elSaveStatus.textContent = "保存状态：已保存";
      }

      function moveWithinGroup(delta) {
        const group = currentGroup();
        if (!group || !group.indices.length) return;
        const position = currentPositionInGroup();
        const nextPosition = Math.min(group.indices.length - 1, Math.max(0, position + delta));
        currentIndex = group.indices[nextPosition];
        render();
      }

      function moveGroup(delta) {
        if (!groups.length) return;
        currentGroupIndex = Math.min(groups.length - 1, Math.max(0, currentGroupIndex + delta));
        const group = currentGroup();
        const nextUnlabeled = firstUnlabeledIndex(group);
        currentIndex = nextUnlabeled !== undefined ? nextUnlabeled : group.indices[0];
        render();
        showToast(`第 ${currentGroupIndex + 1} 组`);
      }

      async function mark(label) {
        const candidate = currentCandidate();
        if (!candidate) return;
        const existing = labels[candidate.candidate_id] || {};
        labels[candidate.candidate_id] = {
          ...existing,
          label,
          labelSource: "mobile_label",
          source_id: candidate.source_id,
          source_name: candidate.source_name,
          source_order: candidate.source_order,
          source_candidate_index: candidate.source_candidate_index,
          peak_score: candidate.peak_score,
          peak_timestamp_ms: candidate.peak_timestamp_ms,
          has_pose_features: candidate.has_pose_features,
          candidate_kind: candidate.candidate_kind,
          csv_rel_path: candidate.csv_rel_path,
          json_rel_path: candidate.json_rel_path,
          video_rel_path: candidate.video_rel_path,
          window_start_ms: candidate.window_start_ms,
          window_end_ms: candidate.window_end_ms,
          reviewedByHuman: true,
          reviewedAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        showToast(label);
        await persistLabels();
        moveWithinGroup(1);
      }

      function onTouchStart(event) {
        const touch = event.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchStartTime = Date.now();
      }

      function onTouchEnd(event) {
        const touch = event.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        const elapsed = Date.now() - touchStartTime;
        if (elapsed > 900) return;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 48) return;
        event.preventDefault();
        if (Math.abs(dy) > Math.abs(dx)) {
          moveWithinGroup(dy < 0 ? 1 : -1);
        } else {
          moveGroup(dx < 0 ? 1 : -1);
        }
      }

      elBtnSwing.addEventListener("click", () => mark(positive));
      elBtnOther.addEventListener("click", () => mark(negative));
      elApp.addEventListener("touchstart", onTouchStart, { passive: true });
      elApp.addEventListener("touchend", onTouchEnd, { passive: false });

      (async () => {
        buildGroups();
        await loadLabels();
        const group = currentGroup();
        const nextUnlabeled = firstUnlabeledIndex(group);
        currentIndex = nextUnlabeled !== undefined ? nextUnlabeled : group?.indices[0] || 0;
        render();
      })();
    </script>
  </body>
</html>
